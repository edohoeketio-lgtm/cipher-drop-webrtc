name: Production Build Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Static Check
        run: npx tsc --noEmit

      - name: Build Production Bundle
        run: npm run build

      - name: Bundle Size Audit
        run: |
          echo "Build successful! Printing bundle statistics:"
          ls -lh dist/assets/
